# ─────────────────────────────────────────────────────────────
# CarDost — Host-level nginx site config
# Path: /etc/nginx/sites-available/cardost.conf
# Symlink to:  /etc/nginx/sites-enabled/cardost.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# This config terminates SSL, redirects HTTP→HTTPS, and proxies all traffic
# to the frontend container on 127.0.0.1:8080 (which serves the React build
# and proxies /api → backend:8001 inside the Docker network).
# ─────────────────────────────────────────────────────────────

# Apex + www → HTTPS apex
server {
  listen 80;
  listen [::]:80;
  server_name cardost.in www.cardost.in;

  # ACME challenge for Let's Encrypt (certbot writes here)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://cardost.in$request_uri;
  }
}

# www → apex (HTTPS)
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.cardost.in;

  ssl_certificate     /etc/letsencrypt/live/cardost.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cardost.in/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  return 301 https://cardost.in$request_uri;
}

# Main site (HTTPS apex)
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name cardost.in;

  # ─── TLS ───
  ssl_certificate     /etc/letsencrypt/live/cardost.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cardost.in/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # ─── Limits ───
  client_max_body_size 25M;          # product gallery uploads / CSV imports
  proxy_read_timeout   120s;
  proxy_send_timeout   120s;

  # ─── Logging ───
  access_log /var/log/nginx/cardost.access.log;
  error_log  /var/log/nginx/cardost.error.log warn;

  # ─── Security headers ───
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # ─── Reverse-proxy everything to the frontend container ───
  # The frontend container's internal nginx handles SPA + /api routing.
  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # ─── Razorpay webhook (optional explicit route — same as above) ───
  # location /api/webhooks/razorpay {
  #   proxy_pass http://127.0.0.1:8080;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }
}
