# Internal nginx that runs INSIDE the frontend container.
# The host-level nginx in deploy/nginx/cardost.conf is what handles SSL + the public domain.
# This container's nginx just serves the React build and proxies /api to the backend service.

server {
  listen 80 default_server;
  server_name _;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml font/woff2 image/svg+xml;

  # Hard cache fingerprinted assets
  location /static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Serve sitemap XML directly as XML, not through the SPA fallback.
  location = /sitemap.xml {
    root /usr/share/nginx/html;
    default_type application/xml;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  location = /sitemap.xsl {
    root /usr/share/nginx/html;
    default_type application/xml;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  location = /robots.txt {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri =404;
  }

  # Backend API — Docker DNS resolves "backend" to the FastAPI container
  location /api/ {
    proxy_pass http://backend:8001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    client_max_body_size 25M;     # product gallery / CSV / etc.
  }

  # SPA fallback — React Router
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
